<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeEdit AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>AnimeEdit AI</h1>
      <span id="status-dot" class="dot offline"></span>
    </header>

    <section id="prompt-section">
      <label for="prompt-input">Prompt</label>
      <textarea
        id="prompt-input"
        rows="5"
        placeholder="Describe your edit…&#10;e.g. cut every 4 beats with zoom-in on downbeats"
      ></textarea>
      <div id="prompt-actions">
        <button id="btn-analyze" class="btn btn-primary">Analyze</button>
        <button id="btn-apply" class="btn btn-accent" disabled>Apply</button>
        <button id="btn-test" class="btn btn-secondary">Test Connection</button>
        <button id="btn-settings" class="btn btn-icon" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </section>

    <section id="results-section" class="hidden">
      <h2>Analysis</h2>
      <div id="results-content"></div>
    </section>

    <section id="settings-panel" class="hidden">
      <h2>Settings</h2>
      <div class="field">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." />
      </div>
      <div class="field">
        <label for="provider-select">Provider</label>
        <select id="provider-select">
          <option value="openrouter">OpenRouter</option>
          <option value="gemini">Gemini</option>
        </select>
      </div>
      <div class="field">
        <label for="model-select">Model</label>
        <select id="model-select">
          <option value="gpt-4o-mini">GPT-4o-mini</option>
          <option value="gpt-4o">GPT-4o</option>
          <option value="claude-3-haiku">Claude 3 Haiku</option>
          <option value="claude-3.5-sonnet">Claude 3.5 Sonnet</option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-2.0-pro">Gemini 2.0 Pro</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        </select>
      </div>
    </section>

    <footer id="footer">
      <span id="status-text">Ready</span>
    </footer>
  </div>

  <script src="%CEP_SCRIPTS%/CSInterface.js"></script>
  <script src="main.js"></script>
</body>
</html>
